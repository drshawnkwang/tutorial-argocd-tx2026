apiVersion: batch/v1
kind: Job
metadata:
  name: post-sync-test
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: test
          image: busybox
          command: ["sh", "-c", "echo 'Running smoke tests'; sleep 3"]
      restartPolicy: Never
  backoffLimit: 1
